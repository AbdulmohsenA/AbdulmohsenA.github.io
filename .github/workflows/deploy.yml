name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Resize square images to 512x512
        run: |
          find . -iname '*.png' -o -iname '*.jpg' -o -iname '*.jpeg' | while read img; do
            dimensions=$(identify -format "%wx%h" "$img")
            width=$(echo $dimensions | cut -d'x' -f1)
            height=$(echo $dimensions | cut -d'x' -f2)

            if [ "$width" -eq "$height" ]; then
              convert "$img" -resize 512x512\! "$img"
              echo "Resized square image: $img"
            else
              echo "Ignored non-square image: $img"
            fi
          done

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 16

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build
        
      - name: Copy assets
        run: cp -r ./asset_files ./dist/asset_files

      - name: Create CNAME file
        run: echo "abdulmohsen.info" > ./dist/CNAME

      - name: Upload production-ready build files
        uses: actions/upload-artifact@v3
        with:
          name: production-files
          path: ./dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v3
        with:
          name: production-files
          path: ./dist

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
